name: Monitor Tax News

on:
  schedule:
    # Mondays at 07:00 UTC (08:00 CET / 09:00 CEST).
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Existing actions/* versions still ship a Node 20 runtime; opt them
      # into Node 24 now (default from 2026-06-02). Drop this env once each
      # action releases a version that ships Node 24 natively.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    permissions:
      contents: write  # required to commit state.json / LATEST_REPORT.md back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run monitoring agent
        run: python main.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage each file individually — LATEST_REPORT.md may not exist on
          # seed runs, and `git add a b` with a missing path aborts the whole
          # call on some git versions.
          git add state.json
          [ -f LATEST_REPORT.md ] && git add LATEST_REPORT.md || true
          if git diff --cached --name-only | grep -q "LATEST_REPORT.md"; then
            git commit -m "Neue Steuer-News $(date +'%d.%m.%Y')"
          else
            git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          fi
          git push
