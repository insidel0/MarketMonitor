name: Monitor German Tax Courts

on:
  schedule:
    # Run every Monday at 07:00 UTC = 08:00 CET (09:00 CEST in summer)
    - cron: '0 7 * * 1'
  workflow_dispatch:  # Allow manual trigger from GitHub UI for testing

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write  # Required to commit state.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers (Chromium only)
        run: playwright install chromium --with-deps

      - name: Run monitoring agent
        run: python main.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json LATEST_REPORT.md
          # Use a descriptive commit message if the report changed (new publications),
          # otherwise commit silently so watchers are not notified unnecessarily.
          if git diff --cached --name-only | grep -q "LATEST_REPORT.md"; then
            git commit -m "Neue Finanzgericht-Entscheidungen $(date +'%d.%m.%Y')"
          else
            git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          fi
          git push
